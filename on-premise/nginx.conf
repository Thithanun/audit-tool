# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Reverse Proxy for Audit Tool (On-Premise)
# Routes:
#   /auth/v1/    → gotrue:9999
#   /rest/v1/    → rest:3000
#   /storage/v1/ → storage:5000
#   /            → app:3000  (Next.js)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 55m;   # slightly above storage FILE_SIZE_LIMIT (50 MB)

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;

    # ── Upstream blocks ───────────────────────────────────────────────────────
    upstream gotrue  { server gotrue:9999; }
    upstream rest    { server rest:3000;   }
    upstream storage { server storage:5000;}
    upstream app     { server app:3000;    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (Certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Internal API (plain HTTP, container network only) ──────────────────────
    # Used by the Next.js app's server-side code (Server Actions, Route Handlers)
    # to reach auth/rest/storage without going out to the public domain and back
    # in — most Docker/router setups don't support that "hairpin NAT" loopback,
    # which makes server-side fetch() calls to the public HTTPS URL fail with a
    # generic "fetch failed". This port is never published to the host, so it's
    # only reachable from other containers on the audit_net network.
    server {
        listen 8000;
        server_name _;

        location /auth/v1/ {
            proxy_pass       http://gotrue/;
            proxy_set_header Host $host;
        }

        location /rest/v1/ {
            proxy_pass       http://rest/;
            proxy_set_header Host $host;
            proxy_set_header apikey $http_apikey;
        }

        location /storage/v1/ {
            proxy_pass            http://storage/;
            proxy_set_header      Host $host;
            client_max_body_size  55m;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name DOMAIN_PLACEHOLDER;   # replaced by install.sh

        # SSL certificate (issued by Certbot)
        ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

        # Modern SSL settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── GoTrue (Auth) ─────────────────────────────────────────────────────
        location /auth/v1/ {
            proxy_pass         http://gotrue/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── PostgREST (REST API) ──────────────────────────────────────────────
        location /rest/v1/ {
            proxy_pass         http://rest/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Required by PostgREST for cookie-based auth
            proxy_set_header   apikey            $http_apikey;
        }

        # ── Storage API ───────────────────────────────────────────────────────
        location /storage/v1/ {
            proxy_pass         http://storage/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 55m;
        }

        # ── Next.js App ───────────────────────────────────────────────────────
        location / {
            proxy_pass         http://app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (Next.js HMR / server-sent events)
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_read_timeout  86400;
        }
    }
}
