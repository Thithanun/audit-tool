version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Audit Tool — On-Premise Docker Compose
# Services: postgres, gotrue (auth), rest (PostgREST), storage, minio, app, nginx
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  TZ: Asia/Bangkok

networks:
  audit_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  nginx_html:
  app_public:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/10_init.sql:ro
    networks:
      - audit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── GoTrue (Auth) ───────────────────────────────────────────────────────────
  gotrue:
    image: supabase/gotrue:v2.143.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:${GOTRUE_DB_PASSWORD_ENC}@postgres:5432/postgres?search_path=auth"
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_SITE_URL}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      API_EXTERNAL_URL: ${NEXT_PUBLIC_SITE_URL}
      # Email (disable external provider — use email/password only)
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: ""
      GOTRUE_SMTP_PORT: "587"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: ""
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    networks:
      - audit_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PostgREST (REST API) ────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.0.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PGRST_DB_URI: "postgres://authenticator:${POSTGRES_PASSWORD_ENC}@postgres:5432/postgres"
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - audit_net
    # NOTE: no healthcheck — the postgrest/postgrest image ships a minimal static
    # binary with no wget/curl, so an HTTP-based healthcheck always reports
    # "unhealthy" even when PostgREST is running fine (verify via `docker compose
    # logs rest` instead). Matches upstream Supabase's own self-host compose file.

  # ── MinIO (Object Storage backend) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - audit_net
    healthcheck:
      # Use the built-in HTTP health endpoint — avoids needing mc alias to be pre-configured
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Supabase Storage API ────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.0.6
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *common-env
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: "postgres://supabase_storage_admin:${POSTGRES_PASSWORD_ENC}@postgres:5432/postgres"
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: storage
      GLOBAL_S3_ENDPOINT: http://minio:9000
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      GLOBAL_S3_PROTOCOL: http
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      REGION: us-east-1
      TENANT_ID: stub
      IMGPROXY_URL: ""
      ENABLE_IMAGE_TRANSFORMATION: "false"
    networks:
      - audit_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      # ./source is a symlink created by install.sh → ~/audit-tool/audit-tool/
      context: ./source
      dockerfile: ./source/on-premise/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
    image: audit-tool:latest
    restart: unless-stopped
    depends_on:
      # No-auth mode: app no longer calls GoTrue directly, so we only need it started
      # (not fully healthy) to avoid blocking app startup when GoTrue is slow to init.
      gotrue:
        condition: service_started
      rest:
        condition: service_started
      storage:
        condition: service_healthy
    environment:
      <<: *common-env
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # NOTE: intentionally NOT the same value as the build-arg above.
      # The client bundle (browser) was already baked at build time with the
      # public NEXT_PUBLIC_SITE_URL — that's fixed and unaffected by this.
      # This runtime value is what server-side code (Server Actions, Route
      # Handlers, lib/supabase-server.ts) reads via process.env at request time.
      # It must point at nginx's internal-only port (see nginx.conf) instead of
      # the public domain, or server-side fetch() calls fail with "fetch failed"
      # (self-hosted servers usually can't hairpin-NAT back to their own public IP).
      NEXT_PUBLIC_SUPABASE_URL: http://nginx:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    networks:
      - audit_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Nginx (Reverse Proxy + SSL) ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_html:/var/www/certbot:ro
    networks:
      - audit_net
